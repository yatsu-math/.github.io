    <h1>26．2026年ＢＭＯ英国数学オリンピックRound２ 大問２</h1>
    <div class="problem-box">
        <p><strong>【問題】</strong></p>
        <p class="big-text">
            凸四角形 <img src="https://mdeditor.tw" class="tex-inline" alt="ABCD"> の対角線 <img src="https://mdeditor.tw" class="tex-inline" alt="AC"> と <img src="https://mdeditor.tw" class="tex-inline" alt="BD"> の交点を <img src="https://mdeditor.tw" class="tex-inline" alt="X"> とする。辺 <img src="https://mdeditor.tw" class="tex-inline" alt="AD"> と <img src="https://mdeditor.tw" class="tex-inline" alt="BC"> が平行ではなく、垂直二等分線の交点を <img src="https://mdeditor.tw" class="tex-inline" alt="Y"> とする。<img src="https://mdeditor.tw%3DBD" class="tex-inline" alt="AC=BD"> のとき、<img src="https://mdeditor.twY" class="tex-inline" alt="XY"> が <img src="https://mdeditor.tw" class="tex-inline" alt="\angle DXC"> を2等分することを証明せよ。
        </p>
        <details style="margin-top: 20px; border: 1px solid #0056b3; border-radius: 4px; padding: 10px; background: #fff;">
            <summary style="font-weight: bold; color: #0056b3; cursor: pointer; padding: 5px; font-size: 18px;">解説を表示する / 隠す</summary>
            <div class="big-text" style="margin-top: 15px; border-top: 1px dashed #ddd; padding-top: 15px;">
                <p>円 <img src="https://mdeditor.tw" class="tex-inline" alt="AXD"> と円 <img src="https://mdeditor.twBC" class="tex-inline" alt="XBC"> の交点を <img src="https://mdeditor.tw" class="tex-inline" alt="P"> とする。<img src="https://mdeditor.tw%3DBD" class="tex-inline" alt="AC=BD"> より <img src="https://mdeditor.tw" class="tex-inline" alt="\triangle PAC \equiv \triangle PDB"> となり、点 <img src="https://mdeditor.tw" class="tex-inline" alt="P"> は垂直二等分線の交点 <img src="https://mdeditor.tw" class="tex-inline" alt="Y"> と一致する。</p>
                <img src="https://mdeditor.tw" class="tex-display" alt="\angle APD = \angle AXD = \angle CXB = \angle CPB">
                <p><img src="https://mdeditor.tw" class="tex-inline" alt="\triangle APD"> と <img src="https://mdeditor.tw" class="tex-inline" alt="\triangle BPC"> は相似な二等辺三角形で、<img src="https://mdeditor.tw" class="tex-inline" alt="\angle PAD = \angle PBC"> が成り立つ。</p>
                <img src="https://mdeditor.tw" class="tex-display" alt="\angle PXD = \angle PAD = \angle PBC = \angle PXC">
                <p>したがって、直線 <img src="https://mdeditor.twP" class="tex-inline" alt="XP">（すなわち <img src="https://mdeditor.tw" class="tex-inline" alt="Y">）は <img src="https://mdeditor.tw" class="tex-inline" alt="\angle DXC"> を二等分する。</p>
                <p style="text-align: center; margin: 25px 0 10px 0; border-top: 1px dashed #eee; padding-top: 20px;">
                    <img src="1001.jpg" width="350" alt="解説の図形" style="max-width:100%; height:auto;">
                </p>
            </div>
        </details>
