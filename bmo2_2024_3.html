<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年ＢＭＯ英国数学オリンピックRound２ 大問２ - 数オリ幾何</title>
    <!-- CSS/JS埋め込み: 元サイト準拠 -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script defer src="https://jsdelivr.net"></script>
    <script defer src="https://jsdelivr.net"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.8; color: #333; max-width: 760px; margin: 0 auto; padding: 40px 20px; background-color: #fdfdfd; }
        .header-meta { color: #666; font-size: 0.9em; margin-bottom: 30px; }
        h1 { font-size: 1.8em; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .problem-box { background-color: #fff; border: 1px solid #ddd; border-left: 5px solid #0066cc; padding: 20px; border-radius: 4px; }
        .toggle-btn { display: inline-block; background-color: #f0f4f8; color: #0066cc; padding: 10px 24px; cursor: pointer; border: 1px solid #cbd5e1; border-radius: 6px; font-weight: bold; }
        .solution-content { display: none; padding: 25px; }
        .solution-content.show { display: block; }
    </style>
</head>
<body>
    <h1>2026年ＢＭＯ英国数学オリンピックRound２ 大問２</h1>
    <div class="header-meta">数オリ幾何 谷津綱一<br>2026年2月14日 10:51</div>
    <h2>【問題】</h2>
    <div class="problem-box">
        凸四角形 $ABCD$ の対角線 $AC$ と $BD$ の交点を $X$ とする...（問題文）
    </div>
    <div class="toggle-container">
        <div class="toggle-btn" id="toggleBtn" onclick="toggleSolution()">解説を表示する</div>
    </div>
    <div class="solution-content" id="solutionContent">
        <p>円 $AXD$ と円 $XBC$ の交点を $P$ とすると、点 $P$ は辺 $AD$ と辺 $BC$ の垂直二等分線の交点だから点 $Y$ と一致する...（解説文）</p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}]}));
        function toggleSolution() {
            const content = document.getElementById("solutionContent"), btn = document.getElementById("toggleBtn");
            content.classList.toggle("show");
            btn.textContent = content.classList.contains("show") ? "解説を隠す" : "解説を表示する";
        }
    </script>
</body>
</html>
