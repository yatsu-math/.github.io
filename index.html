html<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学オリンピックの幾何</title>
    
    <!-- 💡 $ や $$ を数式として認識させるための安全な設定 💡 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']]
            }
        };
    </script>
    <!-- 💡 安全な数式プログラム（MathJax） 💡 -->
    <script id="MathJax-script" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>

    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; }
        h2 { color: #555; margin-top: 30px; }
        .problem-box { background: #f8f9fa; border-left: 4px solid #0056b3; padding: 15px; margin: 20px 0; }
    </style>
</head>
<body>

    <h1>数学オリンピックの幾何</h1>
    
    <!-- 💡 前後を「半角の $」にきっちり修正しました 💡 -->
    <p>文中に埋め込むインライン数式： $E = mc^2$ です。</p>
    
    <p>このページでは、世界の数学オリンピックの幾何の問題を紹介します。</p>

    <div class="problem-box">
        <h2>問題1：サンプルの数式</h2>
        <!-- 💡 前後を「半角の $$」にきっちり修正しました 💡 -->
        <p>$$ \int_{a}^{b} x^2 \, dx = \left[ \frac{x^3}{3} \right]_{a}^{b} $$</p>
    </div>

</body>
</html>
